<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/"
      }
    }
  </script>
  <title>3D Audio Spectrogram Visualiser</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      overflow: hidden;
    }
    #startButton {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      font-size: 18px;
      color: #000000;
      background-color: rgb(255, 255, 255);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 10;
    }
    #controlContainer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0, 0, 0, 0.85);
      padding: 12px 24px;
      border-radius: 8px;
      border: 1px solid #333;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      pointer-events: auto;
    }
    #freqSlider {
      width: 250px;
      cursor: pointer;
      accent-color: #fff;
    }
  </style>
</head>
<body>
  <button id="startButton">Start</button>
  <div id="controlContainer">
    <label for="freqSlider" id="sliderLabel">Max Frequency: 10.0 kHz</label>
    <input type="range" id="freqSlider" min="1000" max="22000" step="500" value="10000">
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
